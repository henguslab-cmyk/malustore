<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MaluStore - Preview Local</title>
  <style>
    :root {
      --bg: #f5f7ff;
      --ink: #1f2a44;
      --card: #ffffff;
      --accent: #006e6d;
      --error: #b42318;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--ink);
      background: radial-gradient(circle at 15% 15%, #dce5ff 0%, #f5f7ff 38%, #e6f4f3 100%);
    }
    main { max-width: 1120px; margin: 0 auto; padding: 32px 20px 56px; }
    .hero {
      background: linear-gradient(130deg, #10316b, #006e6d);
      color: #fff;
      border-radius: 24px;
      padding: 28px;
      margin-bottom: 24px;
    }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; }
    .card {
      background: var(--card);
      border: 1px solid #d7dbeb;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 10px 20px rgba(16, 49, 107, 0.08);
    }
    .card img, .placeholder {
      width: 100%;
      height: 170px;
      object-fit: cover;
      background: #d2e5ff;
    }
    .placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      color: #274673;
    }
    .content { padding: 14px; }
    .content h3 { margin: 0 0 4px; font-size: 1.06rem; }
    .content p { margin: 0 0 14px; color: #4a5674; min-height: 2.6em; }
    .content strong { color: var(--accent); font-size: 1rem; }
    .status {
      background: #fff5f3;
      border: 1px solid #fed4cf;
      color: var(--error);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <main>
    <header class="hero">
      <h1>MaluStore</h1>
      <p>Preview local em HTML consumindo Supabase.</p>
    </header>
    <section id="status"></section>
    <section id="grid" class="grid"></section>
  </main>

  <script>
    // Defina os valores locais antes de usar este preview em HTML.
    // Nao commite chaves reais aqui.
    const SUPABASE_URL = "https://YOUR-PROJECT.supabase.co";
    const SUPABASE_KEY = "sb_publishable_YOUR_KEY";

    const statusEl = document.getElementById("status");
    const gridEl = document.getElementById("grid");

    function formatPrice(value) {
      if (typeof value !== "number") return "Preco indisponivel";
      return new Intl.NumberFormat("pt-BR", { style: "currency", currency: "BRL" }).format(value);
    }

    function renderStatus(message) {
      statusEl.innerHTML = `<div class="status">${message}</div>`;
    }

    function renderProducts(products) {
      if (!products.length) {
        renderStatus("Nenhum produto encontrado na tabela <code>products</code>.");
        return;
      }
      statusEl.innerHTML = "";
      gridEl.innerHTML = products.map((product) => `
        <article class="card">
          ${product.image_url ? `<img src="${product.image_url}" alt="${product.name || "Produto"}" />` : `<div class="placeholder">Sem imagem</div>`}
          <div class="content">
            <h3>${product.name || "Produto sem nome"}</h3>
            <p>${product.description || "Sem descricao."}</p>
            <strong>${formatPrice(product.price)}</strong>
          </div>
        </article>
      `).join("");
    }

    async function loadProducts() {
      try {
        const url = `${SUPABASE_URL}/rest/v1/products?select=id,name,description,price,image_url&order=id.desc&limit=12`;
        const response = await fetch(url, {
          headers: {
            apikey: SUPABASE_KEY,
            Authorization: `Bearer ${SUPABASE_KEY}`
          }
        });

        if (!response.ok) {
          const errorText = await response.text();
          throw new Error(errorText || `Erro HTTP ${response.status}`);
        }

        const data = await response.json();
        renderProducts(data);
      } catch (error) {
        renderStatus(`Falha ao buscar produtos: ${error.message}`);
      }
    }

    loadProducts();
  </script>
</body>
</html>
